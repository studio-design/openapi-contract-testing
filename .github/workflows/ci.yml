name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  tests:
    name: PHP ${{ matrix.php }} / PHPUnit ${{ matrix.phpunit }}${{ matrix.deps == 'lowest' && ' / lowest deps' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            phpunit: '11'
            deps: highest
          - php: '8.2'
            phpunit: '11'
            deps: lowest
          - php: '8.3'
            phpunit: '11'
            deps: highest
          - php: '8.3'
            phpunit: '12'
            deps: highest
          - php: '8.4'
            phpunit: '11'
            deps: highest
          - php: '8.4'
            phpunit: '12'
            deps: highest
          - php: '8.4'
            phpunit: '13'
            deps: highest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require --dev "phpunit/phpunit:^${{ matrix.phpunit }}.0" --no-interaction --no-update
          if [ "${{ matrix.deps }}" = "lowest" ]; then
            composer update --prefer-lowest --prefer-dist --no-interaction --no-progress
          else
            composer update --prefer-dist --no-interaction --no-progress
          fi

      - name: Run tests
        run: vendor/bin/phpunit

  pest:
    name: Pest plugin smoke (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    # Pest 3 requires PHPUnit ^11; the mainline matrix also runs PHPUnit
    # 12/13 for which Pest has no compatible major yet. Keeping this job on
    # the PHPUnit 11 floor isolates the Pest plugin without forcing the rest
    # of the matrix to drop newer PHPUnit versions. Pest is added on demand
    # rather than to require-dev so the regular composer install used by the
    # matrix above stays Pest-free.
    #
    # The 2-cell matrix (PHP 8.3 + 8.4) catches PHP-version regressions on
    # the Pest internals the dispatcher depends on (HigherOrderTapProxy,
    # PendingCalls\TestCall, dynamic property access). PHP 8.2 is excluded
    # because Pest 3 dropped PHP 8.2 support around v3.5; bumping the upper
    # Pest version (Pest 4 / PHPUnit ^12) is tracked separately.
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies (with Pest 3)
        # Single resolve: any version conflict surfaces as one dependency
        # tree in the CI log, not as a "no-update succeeded but update
        # failed" two-step that obscures which constraint introduced the
        # conflict.
        run: composer require --dev "phpunit/phpunit:^11.0" "pestphp/pest:^3.0" --prefer-dist --no-interaction --no-progress

      - name: Run Pest smoke tests
        run: composer test:pest

  pest-example:
    name: Pest plugin example
    runs-on: ubuntu-latest
    # The runnable example under examples/pest/ tracks the working tree via a
    # path repository. Without this job the example silently rots whenever the
    # library's public API surface, composer.json, or autoload.files entry
    # changes. Single PHP cell is enough — the example exists to teach, not
    # cover the matrix.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install example dependencies
        working-directory: examples/pest
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run example Pest suite
        working-directory: examples/pest
        run: vendor/bin/pest --colors=always

  psr7-example:
    name: PSR-7 example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install example dependencies
        working-directory: examples/psr7
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PSR-7 example
        working-directory: examples/psr7
        run: composer test

  quickstart-examples:
    name: ${{ matrix.example }} quickstart
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - example: core
            php: '8.2'
          - example: laravel
            php: '8.2'
          - example: symfony
            php: '8.2'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install quickstart dependencies
        working-directory: examples/${{ matrix.example }}
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run quickstart
        working-directory: examples/${{ matrix.example }}
        run: composer test

  docs:
    name: Documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: npm

      - name: Install documentation dependencies
        run: npm ci

      - name: Audit documentation dependencies
        run: npm audit --audit-level=high

      - name: Build searchable documentation
        env:
          DOCS_VERSION: next
        run: npm run docs:build

      - name: Verify rendered documentation version
        env:
          DOCS_VERSION: next
        run: npm run docs:verify-version

      - name: Verify documentation base path
        run: npm run docs:verify-base

      - name: Check documentation links
        run: npm run docs:links

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

  code-style:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  composer-validate:
    name: composer-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          # Run on the lowest supported PHP so any constraint mismatch
          # between composer.json's `php: ^8.2` and the resolved lock
          # surfaces here, not at install time on a downstream consumer.
          php-version: '8.2'
          coverage: none

      - name: Validate composer.json + composer.lock
        run: composer validate --strict

  composer-audit:
    name: composer-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          # Same rationale as composer-validate: the audit itself is
          # platform-independent, but installing on the lowest PHP catches
          # platform-constraint regressions in dependencies.
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Audit installed dependencies
        run: composer audit --abandoned=fail

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Verify Node toolchain is usable
        run: |
          node --version
          npx --version

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run markdown lint test
        run: vendor/bin/phpunit --filter MarkdownCoverageRendererLintTest
