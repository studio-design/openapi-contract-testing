openapi: 3.0.3
info:
  title: Multi-file external $ref fixture
  version: '1.0.0'
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './schemas/pet.yaml'
  /pets/{petId}:
    parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getPet
      responses:
        '200':
          description: A single pet
          content:
            application/json:
              schema:
                $ref: './schemas/pet.yaml'
        '404':
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: './schemas/error.json#/Error'
